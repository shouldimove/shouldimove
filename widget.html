// ─────────────────────────────────────────────
// CATEGORY-AWARE SALARY SCALING
// Different job types respond differently to local cost of living.
// prof: market-rate tech/business; trades: union/licensed; gov: policy-set;
// service: closely tracks minimum wage laws, which strongly correlate with COL.
// SF min wage $18.67/hr, Seattle $19.97/hr, NYC $16/hr vs federal $7.25/hr
// creates a real ~65% wage gap — reflected in the service formula.
// Formulas calibrated to BLS OEWS metro-area dispersion data.
// ─────────────────────────────────────────────


function fmt(n) {
  return n.toLocaleString('en-US');
}

// Read URL params
const params    = new URLSearchParams(location.search);
const destParam = params.get('to')       || '0';
const employer  = params.get('employer') || '';
const accentHex = (params.get('color')  || '1a8cff').replace('#','');

document.documentElement.style.setProperty('--accent', '#' + accentHex);

// Resolve destination city by index or name
let destCity;
if (/^\d+$/.test(destParam)) {
  destCity = cities[+destParam] || cities[0];
} else {
  const q = destParam.toLowerCase();
  destCity = cities.find(c => (c.name + ', ' + c.state).toLowerCase() === q)
          || cities.find(c => c.name.toLowerCase() === q)
          || cities[0];
}

// Set header copy
document.getElementById('wEmployer').textContent = employer
  ? employer.toUpperCase() + ' IS HIRING IN:'
  : 'SHOULDIMOVEAPP.COM';
document.getElementById('wHeadline').textContent = employer
  ? 'Is ' + destCity.name + ' right for you?'
  : 'How does your city compare to ' + destCity.name + '?';
document.getElementById('wDestTag').textContent = String.fromCodePoint(0x1F4CD) + ' ' + destCity.name + ', ' + destCity.state;

// Init — populate city dropdown only
(function init() {
  const fromSel = document.getElementById('wFromCity');
  cities.forEach((c, i) => {
    if (c === destCity) return;
    fromSel.add(new Option(c.name + ', ' + c.state, i));
  });
})();

function wCompare() {
  const originCity  = cities[+document.getElementById('wFromCity').value];
  const userSalary  = +document.getElementById('wSalary').value;

  if (!originCity) return;
  if (!userSalary || userSalary <= 0) {
    const inp = document.getElementById('wSalary');
    inp.style.borderColor = 'var(--red)';
    setTimeout(() => { inp.style.borderColor = ''; }, 2000);
    return;
  }

  // Purchasing power = salary / COL index (higher = better)
  const ppOrigin = userSalary * (1 - originCity.tax) / originCity.col;
  const ppDest   = userSalary * (1 - destCity.tax) / destCity.col;
  const ppGain   = ((ppDest - ppOrigin) / ppOrigin * 100);
  const ppStr    = (ppGain >= 0 ? '+' : '') + ppGain.toFixed(1) + '%';
  const pos      = ppGain >= 0;
  // Salary needed in dest city to match current purchasing power
  const needed   = Math.round(userSalary * (1 - originCity.tax) / (1 - destCity.tax) * (destCity.col / originCity.col));

  const el = document.getElementById('wResults');
  el.className = 'w-results show';
  el.innerHTML =
    '<div class="w-pp-badge">' +
      '<div class="w-pp-num ' + (pos ? 'pos' : 'neg') + '">' + ppStr + '</div>' +
      '<div class="w-pp-label">Purchasing Power Change</div>' +
    '</div>' +
    '<div class="w-stats">' +
      '<div class="w-stat-row">' +
        '<span class="w-stat-label">&#x1F4B0; Your Salary</span>' +
        '<div class="w-stat-vals">' +
          '<span class="w-stat-you">' + originCity.name + ': $' + fmt(userSalary) + '/yr</span>' +
          '<span class="w-stat-dest">Break-even in ' + destCity.name + ': $' + fmt(needed) + '/yr</span>' +
        '</div>' +
      '</div>' +
      '<div class="w-stat-row">' +
        '<span class="w-stat-label">&#x1F3E0; Avg 1BR Rent</span>' +
        '<div class="w-stat-vals">' +
          '<span class="w-stat-you">' + originCity.name + ': $' + fmt(originCity.rent) + '/mo</span>' +
          '<span class="w-stat-dest">' + destCity.name + ': $' + fmt(destCity.rent) + '/mo</span>' +
        '</div>' +
      '</div>' +
      '<div class="w-stat-row">' +
        '<span class="w-stat-label">&#x1F4CA; Cost of Living Index</span>' +
        '<div class="w-stat-vals">' +
          '<span class="w-stat-you">' + originCity.name + ': ' + originCity.col + '</span>' +
          '<span class="w-stat-dest">' + destCity.name + ': ' + destCity.col + '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="w-verdict ' + (pos ? 'pos' : 'neg') + '">' +
      (pos
        ? '&#x2705; Your $' + fmt(userSalary) + ' goes <strong>' + ppStr + ' further</strong> in ' + destCity.name + ' than in ' + originCity.name + '.'
        : '&#x26A0;&#xFE0F; You\'d need <strong>$' + fmt(needed) + '/yr</strong> in ' + destCity.name + ' to match your current purchasing power.'
      ) +
    '</div>';
}
